apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-app-cluster-a
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/444jop/gitops_room9.git
    targetRevision: main
    path: apps/nginx/overlays/cluster-a

  destination:
    name: in-cluster
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true